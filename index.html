<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Camus - ألبرت كامو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f0b 50%, #3d2b1f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 150px;
        }

        .book-container {
            position: relative;
            width: 400px;
            height: 500px;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            margin-bottom: 50px;
        }

        .book {
            position: absolute;
            width: 400px;
            height: 500px;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .book:hover {
            transform: rotateY(-15deg) rotateX(5deg);
        }

        /* الغلاف الأمامي */
        .book-cover {
            position: absolute;
            width: 400px;
            height: 500px;
            background: linear-gradient(145deg, #8B4513 0%, #654321 50%, #A0522D 100%);
            border: 8px solid #5D4037;
            box-shadow: 
                20px 20px 40px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #F5DEB3;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            backface-visibility: hidden;
        }

        .title-main {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #DAA520, #B8860B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-arabic {
            font-size: 28px;
            margin-bottom: 20px;
            color: #FFF8DC;
        }

        .author {
            font-size: 20px;
            color: #DEB887;
            margin-bottom: 30px;
        }

        .dedication {
            font-size: 16px;
            color: #F4A460;
            padding: 0 20px;
            line-height: 1.4;
        }

        /* الحواف الجانبية */
        .book-edge-top {
            position: absolute;
            width: 416px;
            height: 20px;
            background: linear-gradient(90deg, #D2691E, #CD853F, #D2691E);
            top: -8px;
            left: -8px;
            border-radius: 10px 10px 0 0;
            transform-origin: top;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .book-edge-bottom {
            position: absolute;
            width: 416px;
            height: 20px;
            background: linear-gradient(90deg, #8B4513, #A0522D, #8B4513);
            bottom: -8px;
            left: -8px;
            border-radius: 0 0 10px 10px;
            transform-origin: bottom;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.4);
        }

        .book-edge-side {
            position: absolute;
            width: 20px;
            height: 500px;
            background: linear-gradient(180deg, #654321, #8B4513, #654321);
            right: -8px;
            top: -8px;
            border-radius: 0 15px 15px 0;
            transform-origin: right;
            box-shadow: 5px 0 15px rgba(0,0,0,0.4);
        }

        /* زر الدخول */
        .btn-container {
            position: relative;
            perspective: 1000px;
        }

        .enter-btn {
            display: block;
            width: 250px;
            height: 70px;
            background: linear-gradient(145deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            border: none;
            border-radius: 35px;
            color: #000;
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 
                0 15px 35px rgba(255, 215, 0, 0.5),
                inset 0 5px 15px rgba(255,255,255,0.4),
                inset 0 -5px 15px rgba(255,165,0,0.4);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateZ(0);
            margin: 0 auto;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .enter-btn:hover {
            transform: translateZ(30px) scale(1.08);
            box-shadow: 
                0 20px 50px rgba(255, 215, 0, 0.7),
                inset 0 8px 20px rgba(255,255,255,0.5);
            background: linear-gradient(145deg, #FFEA00 0%, #FFB347 50%, #FF8C00 100%);
        }

        .enter-btn:active {
            transform: translateZ(10px) scale(1.02);
            box-shadow: 
                0 8px 25px rgba(255, 215, 0, 0.4),
                inset 0 3px 10px rgba(0,0,0,0.3);
        }

        /* تأثيرات الإضاءة والحركة */
        @keyframes float {
            0%, 100% { transform: rotateX(2deg) rotateY(2deg) translateY(0px); }
            50% { transform: rotateX(-2deg) rotateY(-2deg) translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); }
        }

        .book-container:hover .enter-btn {
            animation: glow 2s ease-in-out infinite;
        }

        /* صفحات الكتاب */
        .pages {
            position: absolute;
            width: 380px;
            height: 460px;
            background: repeating-linear-gradient(
                90deg,
                rgba(255,255,255,0.9) 0px,
                rgba(255,255,255,0.9) 2px,
                rgba(250,245,240,0.8) 2px,
                rgba(250,245,240,0.8) 4px
            );
            top: 10px;
            left: 10px;
            border-radius: 8px;
            opacity: 0.3;
            transform-origin: left;
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-height: 700px) {
            .book-container {
                transform: scale(0.85);
                margin-bottom: 30px;
            }
            .enter-btn {
                width: 220px;
                height: 60px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="book-container">
            <div class="book">
                <!-- حواف الكتاب -->
                <div class="book-edge-top"></div>
                <div class="book-edge-bottom"></div>
                <div class="book-edge-side"></div>
                
                <!-- صفحات الكتاب -->
                <div class="pages"></div>
                
                <!-- غلاف الكتاب -->
                <div class="book-cover">
                    <div class="title-main">ALBERT CAMUS</div>
                    <div class="title-arabic">ألبرت كامو</div>
                    <div class="author">كتاب لـ</div>
                    <div class="dedication">الأستاذ: جودي محمد الصالح</div>
                </div>
            </div>
        </div>
        
        <div class="btn-container">
            <a href="albert_camus_ebook.html">
                <button class="enter-btn">دخول</button>
            </a>
        </div>
    </div>
</body>
</html>
